name: v2-quality-gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  qa-v2-accessibility-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm --prefix gajiFE-next ci
      - name: Validate visual baseline config presence
        run: test -f gajiFE-next/tests/visual/visual-baseline.config.json
      - name: Run lint
        run: npm --prefix gajiFE-next run lint
      - name: Run parity E2E suite
        run: npm --prefix gajiFE-next run test:e2e:parity

  docs-artifact-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate artifact paths
        run: ./scripts/validate-artifact-paths.sh

  docs-version-folder-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate spec version folders
        run: ./scripts/validate-spec-version-folders.sh

  backend-ddd-boundary-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run backend boundary tests
        run: |
          cd gajiBE
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  backend-api-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run API contract checks
        run: |
          cd gajiBE
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  backend-security-policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run token/security policy tests
        run: |
          cd gajiBE
          chmod +x ./gradlew
          ./gradlew test --no-daemon
