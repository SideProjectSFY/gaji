name: rag-mvp-release-gates

on:
  pull_request:
    paths:
      - ".github/workflows/rag-mvp-release-gates.yml"
      - "gajiAI/**"
      - "gajiBE/**"
      - "gajiFE/**"
      - "docs/5-qa/**"
  workflow_dispatch:
    inputs:
      run_provider_gates:
        description: "Run provider-backed RAG/chat gates. Requires live services and configured secrets."
        required: true
        type: boolean
        default: false
      rag_warmup_queries:
        description: "RAG gate warmup query count"
        required: true
        type: number
        default: 10
      rag_min_latency_samples:
        description: "RAG gate measured latency sample count"
        required: true
        type: number
        default: 100
      rag_concurrency:
        description: "RAG gate concurrency"
        required: true
        type: number
        default: 5
      chat_transport:
        description: "Learner chat gate transport"
        required: true
        type: choice
        default: stream
        options:
          - stream
          - sync
      chat_warmups:
        description: "Learner chat gate warmup request count"
        required: true
        type: number
        default: 10
      chat_measured_requests:
        description: "Learner chat gate measured request count"
        required: true
        type: number
        default: 100
      chat_concurrency:
        description: "Learner chat gate concurrency"
        required: true
        type: number
        default: 5
      chat_p95_latency_ms:
        description: "Learner chat p95 latency threshold in milliseconds"
        required: true
        type: number
        default: 8000

jobs:
  frontend-rag-ui-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 9.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gajiFE/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: gajiFE
        run: pnpm install --frozen-lockfile

      - name: Run frontend unit tests
        working-directory: gajiFE
        run: pnpm test:run

      - name: Build frontend
        working-directory: gajiFE
        run: pnpm build:check

      - name: Install Playwright Chromium
        working-directory: gajiFE
        run: pnpm exec playwright install --with-deps chromium

      - name: Run RAG source drawer E2E
        working-directory: gajiFE
        run: pnpm test:e2e:chromium

      - name: Upload frontend gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-rag-ui-gate
          path: |
            gajiFE/test-results/**
            gajiFE/playwright-report/**
          if-no-files-found: ignore

  backend-rag-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run backend tests
        working-directory: gajiBE
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  ai-release-gate-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI dependencies
        working-directory: gajiAI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run AI release-gate runner unit tests
        working-directory: gajiAI
        run: pytest -q tests/test_release_gate_runner.py tests/test_chat_release_gate_runner.py tests/test_release_gate_workflow.py

      - name: Run quota-safe release-gate dry runs
        working-directory: gajiAI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GAJI_GATE_ADMIN_EMAIL: ${{ secrets.GAJI_GATE_ADMIN_EMAIL }}
          GAJI_GATE_ADMIN_PASSWORD: ${{ secrets.GAJI_GATE_ADMIN_PASSWORD }}
          GAJI_CHAT_GATE_OWNER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OWNER_EMAIL }}
          GAJI_CHAT_GATE_OWNER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OWNER_PASSWORD }}
          GAJI_CHAT_GATE_OTHER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OTHER_EMAIL }}
          GAJI_CHAT_GATE_OTHER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OTHER_PASSWORD }}
        run: |
          mkdir -p reports/release-gates
          python scripts/run_rag_release_gate.py --dry-run --output-dir reports/release-gates | tee reports/release-gates/rag_dry_run_latest.json
          python scripts/run_chat_release_gate.py --dry-run --output-dir reports/release-gates | tee reports/release-gates/chat_dry_run_latest.json

      - name: Write dry-run summary
        working-directory: gajiAI
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          print("## RAG MVP Release Gate Dry Run")
          for name in ("rag", "chat"):
              payload = json.loads(Path(f"reports/release-gates/{name}_dry_run_latest.json").read_text())
              protocol = payload.get("protocol") or {}
              details = [f"provider gate ready: `{payload.get('provider_gate_ready')}`"]
              if name == "chat":
                  details.append(f"transport: `{protocol.get('transport')}`")
                  details.append(f"delta gate: `{protocol.get('requires_delta_before_completed')}`")
              print(f"- {name}: `{payload['status']}`, " + ", ".join(details))
          PY

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-release-gate-dry-run
          path: gajiAI/reports/release-gates/**

  provider-backed-release-gates:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_provider_gates }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AI dependencies
        working-directory: gajiAI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate provider-backed gate secrets
        env:
          FASTAPI_BASE_URL: ${{ secrets.FASTAPI_BASE_URL }}
          SPRING_BASE_URL: ${{ secrets.SPRING_BASE_URL }}
          GAJI_GATE_ADMIN_EMAIL: ${{ secrets.GAJI_GATE_ADMIN_EMAIL }}
          GAJI_GATE_ADMIN_PASSWORD: ${{ secrets.GAJI_GATE_ADMIN_PASSWORD }}
          RAG_READ_TOKEN: ${{ secrets.RAG_READ_TOKEN }}
          RAG_EVALUATE_TOKEN: ${{ secrets.RAG_EVALUATE_TOKEN }}
          GAJI_GATE_NOVEL_ID: ${{ secrets.GAJI_GATE_NOVEL_ID }}
          GAJI_CHAT_GATE_OWNER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OWNER_EMAIL }}
          GAJI_CHAT_GATE_OWNER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OWNER_PASSWORD }}
          GAJI_CHAT_GATE_OTHER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OTHER_EMAIL }}
          GAJI_CHAT_GATE_OTHER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OTHER_PASSWORD }}
          GAJI_CHAT_GATE_CONVERSATION_ID: ${{ secrets.GAJI_CHAT_GATE_CONVERSATION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          missing=()
          for name in \
            FASTAPI_BASE_URL \
            SPRING_BASE_URL \
            GAJI_GATE_NOVEL_ID \
            GAJI_CHAT_GATE_OWNER_EMAIL \
            GAJI_CHAT_GATE_OWNER_PASSWORD \
            GAJI_CHAT_GATE_OTHER_EMAIL \
            GAJI_CHAT_GATE_OTHER_PASSWORD \
            GAJI_CHAT_GATE_CONVERSATION_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ -z "${GEMINI_API_KEY:-}" ] && [ -z "${GEMINI_API_KEYS:-}" ]; then
            missing+=("GEMINI_API_KEY or GEMINI_API_KEYS")
          fi

          if { [ -z "${RAG_READ_TOKEN:-}" ] || [ -z "${RAG_EVALUATE_TOKEN:-}" ]; } && \
             { [ -z "${GAJI_GATE_ADMIN_EMAIL:-}" ] || [ -z "${GAJI_GATE_ADMIN_PASSWORD:-}" ]; }; then
            missing+=("RAG_READ_TOKEN+RAG_EVALUATE_TOKEN or GAJI_GATE_ADMIN_EMAIL+GAJI_GATE_ADMIN_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required provider gate secrets:\n'
            printf -- '- %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Run provider-backed RAG gate
        working-directory: gajiAI
        env:
          FASTAPI_BASE_URL: ${{ secrets.FASTAPI_BASE_URL }}
          SPRING_BASE_URL: ${{ secrets.SPRING_BASE_URL }}
          GAJI_GATE_ADMIN_EMAIL: ${{ secrets.GAJI_GATE_ADMIN_EMAIL }}
          GAJI_GATE_ADMIN_PASSWORD: ${{ secrets.GAJI_GATE_ADMIN_PASSWORD }}
          GAJI_GATE_NOVEL_ID: ${{ secrets.GAJI_GATE_NOVEL_ID }}
          RAG_READ_TOKEN: ${{ secrets.RAG_READ_TOKEN }}
          RAG_EVALUATE_TOKEN: ${{ secrets.RAG_EVALUATE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GAJI_GATE_OUTPUT_DIR: reports/release-gates
        run: |
          mkdir -p reports/release-gates
          python scripts/run_rag_release_gate.py \
            --warmup-queries "${{ inputs.rag_warmup_queries }}" \
            --min-latency-samples "${{ inputs.rag_min_latency_samples }}" \
            --concurrency "${{ inputs.rag_concurrency }}"

      - name: Run provider-backed learner chat gate
        working-directory: gajiAI
        env:
          SPRING_BASE_URL: ${{ secrets.SPRING_BASE_URL }}
          GAJI_CHAT_GATE_OWNER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OWNER_EMAIL }}
          GAJI_CHAT_GATE_OWNER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OWNER_PASSWORD }}
          GAJI_CHAT_GATE_OTHER_EMAIL: ${{ secrets.GAJI_CHAT_GATE_OTHER_EMAIL }}
          GAJI_CHAT_GATE_OTHER_PASSWORD: ${{ secrets.GAJI_CHAT_GATE_OTHER_PASSWORD }}
          GAJI_CHAT_GATE_CONVERSATION_ID: ${{ secrets.GAJI_CHAT_GATE_CONVERSATION_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GAJI_CHAT_GATE_OUTPUT_DIR: reports/release-gates
        run: |
          python scripts/run_chat_release_gate.py \
            --transport "${{ inputs.chat_transport }}" \
            --warmups "${{ inputs.chat_warmups }}" \
            --measured-requests "${{ inputs.chat_measured_requests }}" \
            --concurrency "${{ inputs.chat_concurrency }}" \
            --p95-latency-ms "${{ inputs.chat_p95_latency_ms }}"

      - name: Write provider-backed gate summary
        if: always()
        working-directory: gajiAI
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import math
          import statistics
          from pathlib import Path

          report_dir = Path("reports/release-gates")

          def latest(pattern):
              matches = sorted(report_dir.glob(pattern))
              return matches[-1] if matches else None

          def quantile(values, pct):
              values = sorted(float(value) for value in values if value is not None)
              if not values:
                  return None
              index = max(0, min(len(values) - 1, math.ceil(len(values) * pct) - 1))
              return round(values[index], 1)

          def summary(values):
              values = sorted(float(value) for value in values if value is not None)
              if not values:
                  return "`n/a`"
              return (
                  f"count `{len(values)}`, p50 `{round(statistics.median(values), 1)} ms`, "
                  f"p95 `{quantile(values, 0.95)} ms`, max `{round(values[-1], 1)} ms`"
              )

          print("## Provider-backed RAG/Chat Release Gates")

          def contains_provider_exhaustion(value):
              text = json.dumps(value, ensure_ascii=False).lower()
              markers = ("resource_exhausted", "quota", "provider", "429")
              return any(marker in text for marker in markers)

          rag_path = latest("rag_release_gate_*.json")
          if rag_path is None:
              print("- RAG: no artifact found")
          else:
              rag = json.loads(rag_path.read_text())
              full_gate = rag.get("full_gate") or {}
              response = full_gate.get("response") or {}
              gates = response.get("release_gates") or {}
              quota_signal = bool(
                  (rag.get("preflight") or {}).get("embedding_quota_error")
                  or full_gate.get("embedding_quota_error")
                  or contains_provider_exhaustion(rag if rag.get("status") != "complete" else {})
              )
              print(f"- RAG artifact: `{rag_path}`")
              print(f"- RAG status: `{rag.get('status')}`")
              print(f"- RAG gates passed: `{gates.get('passed')}`")
              print(f"- RAG quota/provider exhaustion signal: `{quota_signal}`")
              for mode, payload in (response.get("modes") or {}).items():
                  metrics = payload.get("metrics") or {}
                  latency = payload.get("latency") or {}
                  print(
                      f"  - {mode}: Hit@10 `{metrics.get('Hit@10')}`, "
                      f"nDCG@10 `{metrics.get('nDCG@10')}`, "
                      f"p95 `{latency.get('p95_ms')} ms`"
                  )

          chat_path = latest("chat_release_gate_*.json")
          if chat_path is None:
              print("- Chat: no artifact found")
          else:
              chat = json.loads(chat_path.read_text())
              measured = chat.get("measured_results") or []
              gate = chat.get("gate") or {}
              fallback_count = sum(1 for item in measured if item.get("fallback_used"))
              provider_error_count = sum(
                  1 for item in measured
                  if item.get("status") != 200 or item.get("stream_error_events")
              )
              quota_signal = contains_provider_exhaustion(
                  [item for item in measured if item.get("status") != 200 or item.get("stream_error_events")]
              )
              failed = [
                  name for name, passed in (gate.get("assertions") or {}).items()
                  if not passed
              ]
              print(f"- Chat artifact: `{chat_path}`")
              print(f"- Chat status: `{chat.get('status')}`")
              print(f"- Chat decision: `{gate.get('decision')}`")
              print(f"- Chat latency: {summary(item.get('elapsed_ms') for item in measured)}")
              print(f"- Chat first delta: {summary(item.get('stream_first_delta_ms') for item in measured)}")
              print(f"- Chat fallback count/rate: `{fallback_count}/{len(measured) or 1}`")
              print(f"- Chat provider error count: `{provider_error_count}`")
              print(f"- Chat quota/provider exhaustion signal: `{quota_signal}`")
              print(f"- Chat prompt marker leak count: `{sum(1 for item in measured if item.get('prompt_marker_revealed'))}`")
              print(f"- Chat citation text leak count: `{sum(1 for item in measured if item.get('citation_has_text'))}`")
              print(f"- Chat failed assertions: `{failed or 'none'}`")
          PY

      - name: Upload provider-backed gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-backed-release-gates
          path: gajiAI/reports/release-gates/**
