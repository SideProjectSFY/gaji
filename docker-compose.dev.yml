networks:
  gaji-network:
    driver: bridge

volumes:
  postgres-data:
  elasticsearch-data:
  redis-data:

services:
  # PostgreSQL - Metadata plus pgvector RAG passage embeddings
  postgres:
    image: pgvector/pgvector:pg15
    container_name: gaji-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gaji_db}
      POSTGRES_USER: ${DB_USER:-gaji_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - gaji-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaji_user -d gaji_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Long Polling task storage (600s TTL)
  redis:
    image: redis:7-alpine
    container_name: gaji-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - gaji-network
    command: redis-server --appendonly yes
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - BM25 passage index for local retrieval evaluation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: gaji-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - gaji-network
    mem_limit: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # Spring Boot - API + AI/RAG orchestration
  backend:
    build:
      context: ./gajiBE
      dockerfile: Dockerfile.dev
    container_name: gaji-backend
    environment:
      # PostgreSQL (metadata + pgvector RAG passages)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-gaji_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-gaji_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Redis (for health check)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Conversation message search
      CONVERSATION_SEARCH_ELASTICSEARCH_ENABLED: ${CONVERSATION_SEARCH_ELASTICSEARCH_ENABLED:-true}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CONVERSATION_SEARCH_ELASTICSEARCH_INDEX: gaji_conversation_messages_v1
      RAG_ELASTICSEARCH_ENABLED: ${RAG_ELASTICSEARCH_ENABLED:-true}
      RAG_ELASTICSEARCH_INDEX: gaji_novel_passages_v1
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET:-gaji-secret-key-change-in-production}
      # Gemini API keys used directly by Spring AI/RAG
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - gaji-network
    volumes:
      - ./gajiBE:/app
      - /app/build
      - /app/.gradle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Unified Monitoring System
  monitor:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: gaji-monitor
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-gaji_db}
      - DB_USER=${DB_USER:-gaji_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGVECTOR_DATABASE_URL=postgresql://${DB_USER:-gaji_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gaji_db}
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
      - LOG_DIR=/app/logs
      - REPORT_DIR=/app/reports
      - TZ=Asia/Seoul
    volumes:
      - ./monitoring:/app
      - ./logs/monitor:/app/logs
      - ./monitoring/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gaji-network
    restart: unless-stopped

