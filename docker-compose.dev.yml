networks:
  gaji-network:
    driver: bridge

volumes:
  postgres-data:
  chromadb-data:
  elasticsearch-data:
  redis-data:

services:
  # PostgreSQL - Metadata storage only (13 tables)
  postgres:
    image: postgres:15-alpine
    container_name: gaji-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gaji_db}
      POSTGRES_USER: ${DB_USER:-gaji_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gaji-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaji_user -d gaji_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Celery broker + Long Polling task storage (600s TTL)
  redis:
    image: redis:7-alpine
    container_name: gaji-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - gaji-network
    command: redis-server --appendonly yes
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB - VectorDB for development (768-dim embeddings, 5 collections)
  chromadb:
    image: chromadb/chroma:latest
    container_name: gaji-chromadb
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb-data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - gaji-network
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F40' /proc/net/tcp || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Elasticsearch - BM25 passage index for local retrieval evaluation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: gaji-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - gaji-network
    mem_limit: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # Spring Boot - API Gateway (Pattern B)
  backend:
    build:
      context: ./gajiBE
      dockerfile: Dockerfile.dev
    container_name: gaji-backend
    environment:
      # PostgreSQL (metadata only)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-gaji_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-gaji_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # FastAPI internal URL (Pattern B)
      FASTAPI_BASE_URL: http://ai-service:8000
      # Redis (for health check)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # JWT Authentication (must match FastAPI JWT_SECRET_KEY)
      JWT_SECRET: ${JWT_SECRET:-gaji-secret-key-change-in-production}
      # Gemini API keys (used by FastAPI, passed for config validation)
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gaji-network
    volumes:
      - ./gajiBE:/app
      - /app/build
      - /app/.gradle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # FastAPI - Internal-only AI service (Pattern B)
  ai-service:
    build:
      context: ./gajiAI
      dockerfile: Dockerfile.dev
    container_name: gaji-ai-service
    env_file:
      - ./gajiAI/.env
    environment:
      # VectorDB
      VECTORDB_TYPE: chromadb
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      CHROMADB_PATH: /app/chroma_data
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_INDEX_NAME: gaji_novel_passages_v1
      ELASTICSEARCH_ALIAS_NAME: gaji_novel_passages_current
      RAG_VECTOR_COLLECTION_NAME: novel_passages
      RAG_RRF_K: 60
      RAG_RRF_VECTOR_WEIGHT: 2.0
      RAG_RRF_BM25_WEIGHT: 1.0
      RAG_HYBRID_RANKING_POLICY: vector_primary_rrf_fallback
      RAG_CANDIDATE_K_VECTOR: 50
      RAG_CANDIDATE_K_BM25: 50
      EMBEDDING_MODEL_ID: models/gemini-embedding-001
      EMBEDDING_OUTPUT_DIMENSIONALITY: 768
      EMBEDDING_DOCUMENT_TASK_TYPE: RETRIEVAL_DOCUMENT
      EMBEDDING_QUERY_TASK_TYPE: RETRIEVAL_QUERY
      EMBEDDING_REQUEST_TIMEOUT_MS: 30000
      EMBEDDING_QUERY_CACHE_ENABLED: "true"
      EMBEDDING_QUERY_CACHE_MAX_ENTRIES: 2048
      EMBEDDING_QUERY_CACHE_PATH: /app/reports/rag/query_embedding_cache.jsonl
      # Spring Boot URL (for callbacks)
      SPRING_BOOT_BASE_URL: http://backend:8080
      # JWT Authentication (must match Spring Boot JWT_SECRET)
      JWT_SECRET_KEY: ${JWT_SECRET:-gaji-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      AI_BROKER_AUDIENCE: gaji-ai-direct
      AI_BROKER_REQUIRED_SCOPE: ai:chat:complete
      AI_BROKER_ISSUER: gaji-backend
      # Redis for Celery + Long Polling (600s TTL)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - gaji-network
    volumes:
      - ./gajiAI:/app
      - ./.cursor:/app/.cursor # Debug log directory
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Data Import Service (run manually: docker-compose run --rm data-import)
  data-import:
    build:
      context: ./gajiAI
      dockerfile: Dockerfile.dev
    container_name: gaji-data-import
    env_file:
      - ./gajiAI/.env
    environment:
      VECTORDB_TYPE: chromadb
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SPRING_BOOT_URL: http://backend:8080
    depends_on:
      chromadb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - gaji-network
    volumes:
      - ./gajiAI:/app
      - ./data:/data # Mount dataset directory
    working_dir: /app
    entrypoint: ["python", "scripts/import_dataset.py"]
    command:
      [
        "--dataset-path",
        "/data/gutenberg_dataset",
        "--vectordb",
        "chromadb",
        "--vectordb-host",
        "chromadb:8000",
        "--spring-boot-api",
        "http://backend:8080",
      ]
    profiles:
      - import # Only run with: docker-compose --profile import run data-import

  # Unified Monitoring System
  monitor:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: gaji-monitor
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-gaji_db}
      - DB_USER=${DB_USER:-gaji_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - MATTERMOST_WEBHOOK_URL=${MATTERMOST_WEBHOOK_URL}
      - LOG_DIR=/app/logs
      - REPORT_DIR=/app/reports
      - TZ=Asia/Seoul
    volumes:
      - ./monitoring:/app
      - ./logs/monitor:/app/logs
      - ./monitoring/reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - gaji-network
    restart: unless-stopped

